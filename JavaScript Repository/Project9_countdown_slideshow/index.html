<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project 9 - Countdown & Slideshow</title>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>

<body>

<h2>Project 9 – Countdown & Slideshow</h2>

<!-- COUNTDOWN SECTION -->
<h3>Countdown Timer</h3>
<input id="seconds" type="number" placeholder="Enter seconds">
<button onclick="countdown()">Start Countdown</button>
<p id="timer"></p>

<hr><br>

<!-- Slideshow container -->
<div class="slideshow-container">

  <!-- Full-width images with number and caption text -->
  <div class="mySlides fade">
    <div class="numbertext">1 / 3</div>
    <img src="car1.jpg" style="width:100%">
    <div class="text">Car 1</div>
  </div>

  <div class="mySlides fade">
    <div class="numbertext">2 / 3</div>
    <img src="car2.jpg" style="width:100%">
    <div class="text">Car 2</div>
  </div>

  <div class="mySlides fade">
    <div class="numbertext">3 / 3</div>
    <img src="car3.jpg" style="width:100%">
    <div class="text">Car 3</div>
  </div>

</div>
<br>

<!-- The dots/circles -->
<div style="text-align:center">
  <span class="dot" onclick="currentSlide(1)"></span>
  <span class="dot" onclick="currentSlide(2)"></span>
  <span class="dot" onclick="currentSlide(3)"></span>
</div>

</body>
</html>
